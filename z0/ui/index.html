<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <title>Atlas</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    #map {
      width: 100vw;
      height: 100vh;
    }

    .maplibregl-canvas { cursor: crosshair !important; }

    #loading {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      z-index: 999;
      transition: opacity 0.3s linear;
    }
    #loading.done {
      opacity: 0;
      pointer-events: none;
    }
    #loading-name {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.5px;
      color: #fff;
    }
    #loading-sub {
      font-size: 12px;
      font-weight: 400;
      color: #444;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="loading">
    <span id="loading-name">World Map</span>
    <span id="loading-sub">Loading offline data…</span>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
