name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            z0/ui/package-lock.json
            s2/ui/package-lock.json
            h3/ui/package-lock.json

      - name: Build z0
        working-directory: z0/ui
        run: npm ci && npm run build

      - name: Build s2
        working-directory: s2/ui
        run: npm ci && npm run build

      - name: Build h3
        working-directory: h3/ui
        run: npm ci && npm run build

      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r z0/ui/dist/. _site/z0/
          cp -r s2/ui/dist/. _site/s2/
          cp -r h3/ui/dist/. _site/h3/
          cp index.html _site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
